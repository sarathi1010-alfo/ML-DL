<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#07131a" />
  <meta name="description" content="MediLingua — Personalized Language Learning for Medical Professionals. AI-powered proficiency assessment, learning tracking, communication analysis, scenario practice, content generation, and an agentic AI tutor." />
  <title>MediLingua — Medical Language Learning</title>

  <!-- Favicon (inline SVG) -->
  <link rel="icon" type="image/svg+xml" href="/app/assets/logo.svg" />

  <!-- Stylesheets -->
  <link rel="stylesheet" href="/app/css/variables.css" />
  <link rel="stylesheet" href="/app/css/base.css" />
  <link rel="stylesheet" href="/app/css/components.css" />
  <link rel="stylesheet" href="/app/css/layout.css" />
  <link rel="stylesheet" href="/app/css/views.css" />

  <!-- Set theme early to avoid FOUC -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('medilingua_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <noscript>
    <div style="padding: 24px; font-family: system-ui, sans-serif; color: #eaf6fb; background: #07131a; min-height: 100vh;">
      <h1>JavaScript required</h1>
      <p>MediLingua requires JavaScript to run. Please enable JavaScript in your browser.</p>
    </div>
  </noscript>

  <!-- Load order: utils → data → api → charts → components → router → views → app boots -->
  <script src="/app/js/utils.js"></script>
  <script src="/app/js/data.js"></script>
  <script src="/app/js/api.js"></script>
  <script src="/app/js/charts.js"></script>
  <script src="/app/js/components.js"></script>
  <script src="/app/js/router.js"></script>

  <!-- Views (each registers itself on window.Views) -->
  <script src="/app/js/views/login.js"></script>
  <script src="/app/js/views/dashboard.js"></script>
  <script src="/app/js/views/proficiency.js"></script>
  <script src="/app/js/views/tracker.js"></script>
  <script src="/app/js/views/analyzer.js"></script>
  <script src="/app/js/views/scenario.js"></script>
  <script src="/app/js/views/studio.js"></script>
  <script src="/app/js/views/tutor.js"></script>
  <script src="/app/js/views/explainability.js"></script>
  <script src="/app/js/views/safety.js"></script>
  <script src="/app/js/views/monitoring.js"></script>
  <script src="/app/js/views/settings.js"></script>

  <!-- App bootstrap -->
  <script src="/app/js/app.js"></script>
</body>
</html>
