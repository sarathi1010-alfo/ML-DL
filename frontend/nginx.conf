# nginx config for the AI Engineering Platform frontend.
# Serves the static SPA and proxies API requests to the FastAPI backend.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA entry — redirect / to /app/index.html
    location = / {
        return 302 /app/index.html;
    }

    # Static SPA
    location /app/ {
        try_files $uri $uri/ /app/index.html;
        add_header Cache-Control "no-cache";
    }

    # API proxy → backend container (strip XTransformPort; not needed inside Docker)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 25m;
    }

    # Health passthrough
    location = /health {
        proxy_pass http://backend:8000/api/v1/health;
    }
}
